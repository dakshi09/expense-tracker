<!DOCTYPE html>
<html>
<head>
    <title>💸 Expense Tracker</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #a8e063, #56ab2f);
            margin: 0;
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #2e7d32;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
        }

        th {
            background: #2e7d32;
            color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        .table-container {
            max-height: 300px;
            overflow-y: auto;
        }

        #dashboard {
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- AUTH -->
    <div id="auth" class="card">
        <h2>💚 Login / Signup</h2>
        <input id="user" placeholder="Username"><br>
        <input id="email" placeholder="Email"><br>
        <input id="pass" type="password" placeholder="Password"><br>
        <button onclick="signup()">Signup</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

        <div class="top-bar">
            <h1>💸 Expense Tracker</h1>
            <div>
                <span id="profile"></span>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="card">
            <input id="category" placeholder="📂 Category">
            <input id="amount" type="number" placeholder="💰 Amount">
            <input id="date" type="date">
            <button onclick="addExpense()">➕ Add</button>
        </div>

        <div class="card">
            <input id="search" placeholder="🔍 Search..." onkeyup="searchExpense()">
            <input id="budget" type="number" placeholder="Set Monthly Budget">
            <button onclick="setBudget()">Set Budget</button>
            <h3 id="result"></h3>
        </div>

        <!-- Chart -->
        <div class="card">
            <canvas id="chart"></canvas>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>

</div>

<script>

let expenses = [];
let currentUser = null;
let budget = 0;
let chart;

// ===== USERS =====
function getUsers() {
    return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

// ===== AUTH =====
function signup() {
    let user = document.getElementById("user").value;
    let email = document.getElementById("email").value.toLowerCase();
    let pass = document.getElementById("pass").value;

    if (!user || !email || !pass) return alert("Fill all fields");

    let users = getUsers();
    if (users.find(u => u.email === email)) return alert("User exists");

    users.push({ user, email, pass });
    saveUsers(users);

    currentUser = email;
    startApp(user);
}

function login() {
    let email = document.getElementById("email").value.toLowerCase();
    let pass = document.getElementById("pass").value;

    let users = getUsers();
    let u = users.find(x => x.email === email && x.pass === pass);

    if (!u) return alert("Invalid login");

    currentUser = email;
    startApp(u.user);
}

function startApp(username) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("profile").innerText = "👤 " + username;

    loadData();
}

// ===== LOGOUT =====
function logout() {
    location.reload();
}

// ===== DATA =====
function loadData() {
    expenses = JSON.parse(localStorage.getItem(currentUser)) || [];
    display(expenses);
    updateChart();
}

function saveData() {
    localStorage.setItem(currentUser, JSON.stringify(expenses));
}

// ===== ADD =====
function addExpense() {
    let cat = document.getElementById("category").value;
    let amt = parseFloat(document.getElementById("amount").value);
    let date = document.getElementById("date").value;

    if (!cat || amt <= 0 || !date) return alert("Invalid");

    expenses.push({ id: Date.now(), category: cat, amount: amt, date });
    saveData();
    display(expenses);
    updateChart();
    checkBudget();
}

// ===== DISPLAY =====
function display(data) {
    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach((e, i) => {
        tbody.innerHTML += `
        <tr>
            <td>${e.id}</td>
            <td>${e.category}</td>
            <td>${e.amount}</td>
            <td>${e.date}</td>
            <td>
                <button onclick="editExpense(${i})">✏️</button>
                <button onclick="deleteExpense(${i})">🗑</button>
            </td>
        </tr>`;
    });
}

// ===== EDIT =====
function editExpense(i) {
    let newAmt = prompt("New Amount:", expenses[i].amount);
    if (newAmt) {
        expenses[i].amount = parseFloat(newAmt);
        saveData();
        display(expenses);
        updateChart();
    }
}

// ===== DELETE =====
function deleteExpense(i) {
    expenses.splice(i,1);
    saveData();
    display(expenses);
    updateChart();
}

// ===== SEARCH =====
function searchExpense() {
    let q = document.getElementById("search").value.toLowerCase();
    display(expenses.filter(e => e.category.toLowerCase().includes(q)));
}

// ===== BUDGET =====
function setBudget() {
    budget = parseFloat(document.getElementById("budget").value);
}

function checkBudget() {
    let total = expenses.reduce((s,e)=>s+e.amount,0);
    if (budget && total > budget) {
        document.getElementById("result").innerText = "⚠ Budget exceeded!";
    }
}

// ===== CHART =====
function updateChart() {
    let data = {};

    expenses.forEach(e => {
        data[e.category] = (data[e.category] || 0) + e.amount;
    });

    let labels = Object.keys(data);
    let values = Object.values(data);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        }
    });
}

</script>

</body>
</html>
